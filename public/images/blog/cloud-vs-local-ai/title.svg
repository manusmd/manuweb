<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#080a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.72" r="0.55">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#182031" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>

  <!-- motif: cloud (blocked, muted) above; local machine with lock (glowing) below -->
  <g transform="translate(760 120)">
    <!-- cloud -->
    <path d="M60 120 a52 52 0 0 1 100 -22 a40 40 0 0 1 38 22 a34 34 0 0 1 -6 68 H74 a44 44 0 0 1 -14 -68 Z"
          fill="#141a26" stroke="#39435a" stroke-width="3" opacity="0.75"/>
    <!-- strike through the cloud -->
    <line x1="48" y1="150" x2="220" y2="30" stroke="#f87171" stroke-width="6" stroke-linecap="round"/>

    <!-- connector down (severed) -->
    <line x1="140" y1="150" x2="140" y2="205" stroke="#39435a" stroke-width="3" stroke-dasharray="6 9"/>

    <!-- machine box -->
    <rect x="20" y="215" width="300" height="170" rx="22" fill="#0e1420" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="20" y="215" width="300" height="42" rx="22" fill="#8b5cf6" opacity="0.12"/>
    <circle cx="46" cy="236" r="5" fill="#4b5568"/>
    <circle cx="64" cy="236" r="5" fill="#4b5568"/>
    <text x="300" y="242" text-anchor="end" fill="#7c86a0" font-size="18" font-weight="600" font-family="monospace">localhost</text>
    <!-- lock -->
    <g transform="translate(140 288)">
      <rect x="0" y="24" width="60" height="46" rx="9" fill="#34d399" opacity="0.16" stroke="#34d399" stroke-width="3"/>
      <path d="M12 24 v-10 a18 18 0 0 1 36 0 v10" fill="none" stroke="#34d399" stroke-width="5"/>
      <circle cx="30" cy="45" r="6" fill="#34d399"/>
    </g>
  </g>

  <!-- text -->
  <text x="80" y="250" fill="#37c393" font-size="24" font-weight="600" letter-spacing="7">ESSAY · PRIVACY</text>
  <text x="78" y="348" fill="#f4f7fb" font-size="74" font-weight="800" letter-spacing="-2">Cloud vs. Local AI</text>
  <text x="80" y="414" fill="#9aa4b8" font-size="31" font-weight="500">A privacy decision, not just a cost one</text>

  <line x1="82" y1="588" x2="122" y2="588" stroke="#34d399" stroke-width="3"/>
  <text x="138" y="596" fill="#6b7488" font-size="23" font-weight="600" letter-spacing="2">manu-web.de · Blog</text>
</svg>
