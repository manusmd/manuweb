<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#080a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.7" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#182031" stroke-width="1"/>
    </pattern>
    <linearGradient id="reality" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.7" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f87171"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>

  <!-- motif: expectation (dashed, up) vs reality (solid, breaks down) -->
  <g transform="translate(690 150)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="360" x2="440" y2="360" stroke="#243049" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="360" stroke="#243049" stroke-width="2"/>
    <!-- expectation -->
    <polyline points="10,330 130,250 250,160 370,70 430,30" stroke="#3ba776" stroke-width="4" stroke-dasharray="2 12" opacity="0.85"/>
    <!-- reality: rises then fractures downward -->
    <polyline points="10,330 120,270 220,235 300,255 360,300 420,340" stroke="url(#reality)" stroke-width="6"/>
    <circle cx="220" cy="235" r="7" fill="#a78bfa"/>
    <circle cx="420" cy="340" r="9" fill="#f87171"/>
    <circle cx="420" cy="340" r="16" fill="#f87171" opacity="0.25"/>
  </g>

  <!-- text -->
  <text x="80" y="250" fill="#5b93f0" font-size="24" font-weight="600" letter-spacing="7">ESSAY · AI &amp; CODING</text>
  <text x="78" y="352" fill="#f4f7fb" font-size="86" font-weight="800" letter-spacing="-2">After the Vibe</text>
  <text x="80" y="418" fill="#9aa4b8" font-size="31" font-weight="500">Where AI coding actually breaks down</text>

  <line x1="82" y1="588" x2="122" y2="588" stroke="#3b82f6" stroke-width="3"/>
  <text x="138" y="596" fill="#6b7488" font-size="23" font-weight="600" letter-spacing="2">manu-web.de · Blog</text>
</svg>
